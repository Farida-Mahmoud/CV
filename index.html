<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <video autoplay muted playsinline>
        <source src="Cute Pink Feminine Pixelated Loading Animation Video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <script>
        document.querySelector("video").addEventListener("ended", () => {
            window.location.href = "CV.html";
        });

        // Fallback timeout in case the video duration is too long
        setTimeout(() => {
            window.location.href = "CV.html";
        }, 4000);
    </script>
</body>
</html>
